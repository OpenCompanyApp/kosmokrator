name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pcntl, posix, mbstring, sqlite3, pdo_sqlite, curl, openssl, dom, xml
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction

      - name: PHPStan
        run: php vendor/bin/phpstan analyse --no-progress

      - name: Tests
        run: php vendor/bin/phpunit tests/Unit --no-coverage

  build-phar:
    name: Build PHAR
    runs-on: ubuntu-latest
    needs: quality
    if: always() && needs.quality.result != 'cancelled'
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pcntl, posix, mbstring, sqlite3, pdo_sqlite, curl, openssl, zlib, dom, xml, xmlwriter, simplexml, phar, tokenizer, ctype, filter
          tools: composer:v2
          ini-values: phar.readonly=0

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Install Box
        run: composer global require humbug/box

      - name: Build PHAR
        run: |
          mkdir -p builds
          box compile

      - name: Verify PHAR
        run: |
          php -r "echo 'PHAR size: ' . filesize('builds/kosmokrator.phar') . ' bytes';"

      - name: Upload PHAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: kosmokrator-phar
          path: builds/kosmokrator.phar

  build-binaries:
    name: Build binary (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: [quality, build-phar]
    if: always() && needs.quality.result != 'cancelled' && needs.build-phar.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-aarch64
            runner: macos-14
            spc-arch: aarch64
          - platform: linux-x86_64
            runner: ubuntu-latest
            spc-arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Download PHAR
        uses: actions/download-artifact@v4
        with:
          name: kosmokrator-phar
          path: builds

      - name: Install static-php-cli (spc)
        run: |
          if [ "${{ matrix.platform }}" = "linux-x86_64" ]; then
            curl -fsSL -o spc https://dl.static-php.dev/static-php-cli/spc-bin/nightly/spc-linux-x86_64
          elif [ "${{ matrix.platform }}" = "macos-aarch64" ]; then
            curl -fsSL -o spc https://dl.static-php.dev/static-php-cli/spc-bin/nightly/spc-macos-aarch64
          fi
          chmod +x spc

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libxml2-dev libsqlite3-dev libcurl4-openssl-dev libssl-dev zlib1g-dev libzip-dev

      - name: Download PHP source & dependencies
        run: |
          ./spc download --for-extensions="pcntl,posix,mbstring,curl,openssl,dom,xml,simplexml,tokenizer,filter,ctype,phar,zlib,fileinfo,pdo,pdo_sqlite,sqlite3" \
            --with-php=8.4 --prefer-pre-built

      - name: Build static PHP with micro SFX
        run: |
          ./spc build \
            "pcntl,posix,mbstring,curl,openssl,dom,xml,simplexml,tokenizer,filter,ctype,phar,zlib,fileinfo,pdo,pdo_sqlite,sqlite3" \
            --build-micro

      - name: Combine PHAR with micro SFX
        run: |
          ./spc micro:combine builds/kosmokrator.phar --output=kosmokrator-${{ matrix.platform }}
          chmod +x kosmokrator-${{ matrix.platform }}

      - name: Verify binary
        run: |
          ls -lh kosmokrator-${{ matrix.platform }}
          file kosmokrator-${{ matrix.platform }}
          ./kosmokrator-${{ matrix.platform }} --version || echo "Binary built (version check may need TTY)"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: kosmokrator-${{ matrix.platform }}
          path: kosmokrator-${{ matrix.platform }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-phar, build-binaries]
    if: always() && needs.build-phar.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: kosmokrator-*

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/kosmokrator-phar/kosmokrator.phar release/kosmokrator.phar

          # Copy binary artifacts if they exist
          for platform in macos-aarch64 linux-x86_64; do
            if [ -f "artifacts/kosmokrator-${platform}/kosmokrator-${platform}" ]; then
              cp "artifacts/kosmokrator-${platform}/kosmokrator-${platform}" "release/kosmokrator-${platform}"
            fi
          done

          # Generate checksums
          cd release
          sha256sum * > checksums.sha256 || shasum -a 256 * > checksums.sha256
          echo "Release assets:"
          ls -lh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*
