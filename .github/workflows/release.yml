name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pcntl, posix, mbstring, sqlite3, pdo_sqlite, curl, openssl, dom, xml
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction

      - name: PHPStan
        run: php vendor/bin/phpstan analyse --no-progress

      - name: Tests
        run: php vendor/bin/phpunit tests/Unit --no-coverage

  build-phar:
    name: Build PHAR
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pcntl, posix, mbstring, sqlite3, pdo_sqlite, curl, openssl, zlib, dom, xml, xmlwriter, simplexml, phar, tokenizer, ctype, filter
          tools: composer:v2
          ini-values: phar.readonly=0

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Install Box
        run: composer global require humbug/box

      - name: Build PHAR
        run: |
          mkdir -p builds
          box compile

      - name: Verify PHAR
        run: |
          php -r "echo 'PHAR size: ' . filesize('builds/kosmokrator.phar') . ' bytes';"

      - name: Upload PHAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: kosmokrator-phar
          path: builds/kosmokrator.phar

  build-binaries:
    name: Build binary (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-aarch64
            runner: macos-14
            arch: aarch64
          - platform: macos-x86_64
            runner: macos-13
            arch: x86_64
          - platform: linux-x86_64
            runner: ubuntu-latest
            arch: x86_64
          - platform: linux-aarch64
            runner: ubuntu-24.04-arm
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pcntl, posix, mbstring, sqlite3, pdo_sqlite, curl, openssl, zlib, dom, xml, xmlwriter, simplexml, phar, tokenizer, ctype, filter, fileinfo
          tools: composer:v2
          ini-values: phar.readonly=0

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Build PHAR
        run: |
          mkdir -p builds
          composer global require humbug/box
          box compile

      - name: Build static binary
        uses: php/static-bin-builder@v1
        with:
          php-version: '8.4'
          phar-path: builds/kosmokrator.phar
          output-name: kosmokrator-${{ matrix.platform }}
          extensions: pcntl,posix,mbstring,curl,openssl,dom,xml,simplexml,tokenizer,filter,ctype,phar,zlib,fileinfo,pdo,pdo_sqlite,sqlite3

      - name: Verify binary
        run: |
          chmod +x kosmokrator-${{ matrix.platform }}
          ./kosmokrator-${{ matrix.platform }} --version || echo "Binary built (version check may fail without TTY)"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: kosmokrator-${{ matrix.platform }}
          path: kosmokrator-${{ matrix.platform }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-phar, build-binaries]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/kosmokrator-phar/kosmokrator.phar release/kosmokrator.phar
          cp artifacts/kosmokrator-macos-aarch64/kosmokrator-macos-aarch64 release/kosmokrator-macos-aarch64
          cp artifacts/kosmokrator-macos-x86_64/kosmokrator-macos-x86_64 release/kosmokrator-macos-x86_64
          cp artifacts/kosmokrator-linux-x86_64/kosmokrator-linux-x86_64 release/kosmokrator-linux-x86_64
          cp artifacts/kosmokrator-linux-aarch64/kosmokrator-linux-aarch64 release/kosmokrator-linux-aarch64

          # Generate checksums
          cd release
          sha256sum * > checksums.sha256 || shasum -a 256 * > checksums.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/kosmokrator.phar
            release/kosmokrator-macos-aarch64
            release/kosmokrator-macos-x86_64
            release/kosmokrator-linux-x86_64
            release/kosmokrator-linux-aarch64
            release/checksums.sha256
