name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pcntl, posix, mbstring, sqlite3, pdo_sqlite, curl, openssl, dom, xml
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction

      - name: PHPStan
        run: php vendor/bin/phpstan analyse --no-progress

      - name: Tests
        run: php vendor/bin/phpunit tests/Unit --no-coverage

  build-phar:
    name: Build PHAR
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pcntl, posix, mbstring, sqlite3, pdo_sqlite, curl, openssl, zlib, dom, xml, xmlwriter, simplexml, phar, tokenizer, ctype, filter
          tools: composer:v2
          ini-values: phar.readonly=0

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Install Box
        run: composer global require humbug/box

      - name: Build PHAR
        run: |
          mkdir -p builds
          box compile

      - name: Verify PHAR
        run: |
          php -r "echo 'PHAR size: ' . filesize('builds/kosmokrator.phar') . ' bytes';"

      - name: Upload PHAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: kosmokrator-phar
          path: builds/kosmokrator.phar

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-phar]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/kosmokrator-phar/kosmokrator.phar release/kosmokrator.phar

          # Generate checksums
          cd release
          sha256sum * > checksums.sha256 || shasum -a 256 * > checksums.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/kosmokrator.phar
            release/checksums.sha256
