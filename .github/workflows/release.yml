name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pcntl, posix, mbstring, sqlite3, pdo_sqlite, curl, openssl, dom, xml
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction
        env:
          COMPOSER_MIRROR_PATH_REPOS: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Validate Composer metadata
        run: composer validate --no-check-publish

      - name: PHPStan
        run: php vendor/bin/phpstan analyse --no-progress

      - name: Tests
        run: php vendor/bin/phpunit tests/Unit --no-coverage

      - name: Source startup smoke
        run: |
          tmp_home="$(mktemp -d)"
          tmp_cwd="$(mktemp -d)"
          cd "$tmp_cwd"
          HOME="$tmp_home" php "$GITHUB_WORKSPACE/bin/kosmokrator" smoke:startup --json

      - name: Build website docs
        working-directory: website
        run: |
          npm ci
          npm run build

  build-phar:
    name: Build PHAR
    runs-on: ubuntu-latest
    needs: quality
    if: always() && needs.quality.result != 'cancelled'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pcntl, posix, mbstring, sqlite3, pdo_sqlite, curl, openssl, zlib, dom, xml, xmlwriter, simplexml, phar, tokenizer, ctype, filter
          tools: composer:v2
          ini-values: phar.readonly=0

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction
        env:
          COMPOSER_MIRROR_PATH_REPOS: 1

      - name: Install Box
        run: composer global require humbug/box

      - name: Build PHAR
        run: |
          mkdir -p builds
          box compile

      - name: Verify PHAR
        run: |
          php -r "echo 'PHAR size: ' . filesize('builds/kosmokrator.phar') . ' bytes';"
          php -r "require 'phar://' . getcwd() . '/builds/kosmokrator.phar/vendor/autoload.php'; foreach (['OpenCompany\\\\IntegrationCore\\\\Support\\\\ToolProviderRegistry', 'OpenCompany\\\\Integrations\\\\ClickUp\\\\ClickUpServiceProvider'] as \$class) { if (!class_exists(\$class)) { fwrite(STDERR, \"Missing PHAR class: {\$class}\\n\"); exit(1); } }"
          tmp_home="$(mktemp -d)"
          tmp_cwd="$(mktemp -d)"
          cd "$tmp_cwd"
          HOME="$tmp_home" php "$GITHUB_WORKSPACE/builds/kosmokrator.phar" --version
          HOME="$tmp_home" php "$GITHUB_WORKSPACE/builds/kosmokrator.phar" list --raw
          HOME="$tmp_home" php "$GITHUB_WORKSPACE/builds/kosmokrator.phar" smoke:startup --json
          HOME="$tmp_home" php "$GITHUB_WORKSPACE/builds/kosmokrator.phar" web:providers --json

      - name: Upload PHAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: kosmokrator-phar
          path: builds/kosmokrator.phar

  build-binaries:
    name: Build binary (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: [quality, build-phar]
    if: always() && needs.quality.result != 'cancelled' && needs.build-phar.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-aarch64
            runner: macos-14
          - platform: linux-x86_64
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download PHAR
        uses: actions/download-artifact@v4
        with:
          name: kosmokrator-phar
          path: builds

      - name: Download static-php-cli (spc)
        run: |
          if [ "${{ matrix.platform }}" = "linux-x86_64" ]; then
            curl -fsSL -o spc https://dl.static-php.dev/static-php-cli/spc-bin/nightly/spc-linux-x86_64
          elif [ "${{ matrix.platform }}" = "macos-aarch64" ]; then
            curl -fsSL -o spc https://dl.static-php.dev/static-php-cli/spc-bin/nightly/spc-macos-aarch64
          fi
          chmod +x spc

      - name: Build static PHP with micro SFX
        run: ./spc craft .github/spc/craft.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Combine PHAR with micro SFX
        run: ./spc micro:combine builds/kosmokrator.phar --output=kosmokrator-${{ matrix.platform }}

      - name: Verify binary
        run: |
          chmod +x kosmokrator-${{ matrix.platform }}
          ls -lh kosmokrator-${{ matrix.platform }}
          file kosmokrator-${{ matrix.platform }}
          tmp_home="$(mktemp -d)"
          tmp_cwd="$(mktemp -d)"
          cd "$tmp_cwd"
          HOME="$tmp_home" "$GITHUB_WORKSPACE/kosmokrator-${{ matrix.platform }}" --version
          HOME="$tmp_home" "$GITHUB_WORKSPACE/kosmokrator-${{ matrix.platform }}" list --raw
          HOME="$tmp_home" "$GITHUB_WORKSPACE/kosmokrator-${{ matrix.platform }}" smoke:startup --json

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: kosmokrator-${{ matrix.platform }}
          path: kosmokrator-${{ matrix.platform }}

  deploy-docs:
    name: Deploy docs site
    runs-on: ubuntu-latest
    needs: quality
    if: always() && needs.quality.result == 'success'
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 90236e329056579681dbfbc661bbaa06
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Build docs
        working-directory: website
        run: |
          npm ci
          npm run build

      - name: Deploy docs to Cloudflare Pages
        working-directory: website
        run: npx wrangler pages deploy dist --project-name kosmokrator-docs --branch production

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-phar, build-binaries]
    if: always() && needs.build-phar.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pcntl, posix, mbstring, sqlite3, pdo_sqlite, curl, openssl, zlib, dom, xml, xmlwriter, simplexml, phar, tokenizer, ctype, filter
          tools: composer:v2

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: kosmokrator-*

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/kosmokrator-phar/kosmokrator.phar release/kosmokrator.phar

          for platform in macos-aarch64 linux-x86_64; do
            if [ -f "artifacts/kosmokrator-${platform}/kosmokrator-${platform}" ]; then
              cp "artifacts/kosmokrator-${platform}/kosmokrator-${platform}" "release/kosmokrator-${platform}"
            fi
          done

          cd release
          sha256sum * > checksums.sha256 || shasum -a 256 * > checksums.sha256
          sha256sum -c checksums.sha256 || shasum -a 256 -c checksums.sha256
          echo "Release assets:"
          ls -lh

      - name: Install path smoke
        run: |
          tmp_root="$(mktemp -d)"
          mkdir -p "$tmp_root/bin" "$tmp_root/home" "$tmp_root/work"

          if [ -f "release/kosmokrator-linux-x86_64" ]; then
            cp "release/kosmokrator-linux-x86_64" "$tmp_root/bin/kosmokrator"
            chmod +x "$tmp_root/bin/kosmokrator"
            cd "$tmp_root/work"
            PATH="$tmp_root/bin:$PATH" HOME="$tmp_root/home" kosmokrator --version
            PATH="$tmp_root/bin:$PATH" HOME="$tmp_root/home" kosmokrator smoke:startup --json
          fi

          cd "$tmp_root/work"
          HOME="$tmp_root/home" php "$GITHUB_WORKSPACE/release/kosmokrator.phar" smoke:startup --json

      - name: Extract changelog release notes
        run: php bin/changelog extract "$GITHUB_REF_NAME" > release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            release/*
